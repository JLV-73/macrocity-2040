<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MacroCity 2040</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── CANVAS (Three.js renders here) ── -->
  <canvas id="city-canvas"></canvas>

  <!-- ══════════════════════════════════════
       HUD — top bar resource strip
  ══════════════════════════════════════ -->
  <header id="hud">
    <div class="hud-brand">MACROCITY <span class="accent">2040</span></div>

    <div class="hud-resources">
      <div class="res-block" id="res-money">
        <span class="res-icon">◈</span>
        <span class="res-label">CREDITS</span>
        <span class="res-value" id="val-money">5000</span>
      </div>
      <div class="res-block" id="res-energy">
        <span class="res-icon">⚡</span>
        <span class="res-label">ENERGY</span>
        <span class="res-value" id="val-energy">200</span>
      </div>
      <div class="res-block" id="res-pop">
        <span class="res-icon">◉</span>
        <span class="res-label">POPULATION</span>
        <span class="res-value" id="val-pop">0</span>
      </div>
      <div class="res-block" id="res-sat">
        <span class="res-icon">◆</span>
        <span class="res-label">SATISFACTION</span>
        <span class="res-value" id="val-sat">50</span>
        <span class="res-unit">%</span>
      </div>
    </div>

    <div class="hud-time">
      <span id="game-year">YEAR 2040</span>
      <div id="tick-bar"><div id="tick-fill"></div></div>
    </div>
  </header>

  <!-- ══════════════════════════════════════
       SIDEBAR — build panel
  ══════════════════════════════════════ -->
  <aside id="build-panel">
    <div class="panel-title">BUILD</div>

    <button class="build-btn" id="btn-housing" data-type="housing">
      <span class="btn-icon">🏠</span>
      <span class="btn-name">HOUSING</span>
      <span class="btn-cost">▼ 500 cr</span>
      <div class="btn-stats">
        <span class="stat pos">+80 pop</span>
        <span class="stat neg">−15 nrg/tick</span>
        <span class="stat pos">+8 sat</span>
      </div>
    </button>

    <button class="build-btn" id="btn-energy" data-type="energy">
      <span class="btn-icon">⚡</span>
      <span class="btn-name">POWER PLANT</span>
      <span class="btn-cost">▼ 1200 cr</span>
      <div class="btn-stats">
        <span class="stat pos">+120 nrg/tick</span>
        <span class="stat neg">−5 sat</span>
      </div>
    </button>

    <button class="build-btn" id="btn-commercial" data-type="commercial">
      <span class="btn-icon">🏢</span>
      <span class="btn-name">COMMERCIAL</span>
      <span class="btn-cost">▼ 900 cr</span>
      <div class="btn-stats">
        <span class="stat pos">+60 cr/tick</span>
        <span class="stat neg">−25 nrg/tick</span>
        <span class="stat pos">+12 pop</span>
        <span class="stat pos">+12 sat</span>
      </div>
    </button>

    <button class="build-btn" id="btn-park" data-type="park">
      <span class="btn-icon">🌿</span>
      <span class="btn-name">GREEN PARK</span>
      <span class="btn-cost">▼ 300 cr</span>
      <div class="btn-stats">
        <span class="stat pos">+20 sat</span>
        <span class="stat neg">−3 nrg/tick</span>
      </div>
    </button>

    <div class="panel-sep"></div>

    <button class="tool-btn active" id="btn-build-mode">🔨 BUILD</button>
    <button class="tool-btn" id="btn-demolish">💥 DEMOLISH</button>

    <div class="panel-sep"></div>
    <div id="cell-info">
      <div class="info-title">SELECTED CELL</div>
      <div id="cell-detail">— none —</div>
    </div>
  </aside>

  <!-- ══════════════════════════════════════
       TOAST / ALERT overlay
  ══════════════════════════════════════ -->
  <div id="toast-container"></div>

  <!-- ══════════════════════════════════════
       GAME-OVER / WIN screen
  ══════════════════════════════════════ -->
  <div id="overlay" class="hidden">
    <div id="overlay-box">
      <div id="overlay-title">CITY BANKRUPT</div>
      <div id="overlay-msg">Your credits ran out. The megacity crumbled.</div>
      <button id="overlay-restart">RESTART</button>
    </div>
  </div>

  <!-- Three.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- OrbitControls (r128 compatible) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="main.js"></script>
</body>
</html>
